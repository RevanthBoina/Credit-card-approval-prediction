---
applications:
  - name: credit-card-approval-prediction
    memory: 1G
    disk_quota: 2G
    instances: 1
    buildpacks:
      - python_buildpack
    command: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    env:
      # Write prediction history to the ephemeral, writable /tmp directory.
      STORAGE_DIR: /tmp/storage
      # Set a strong secret in production, e.g. via `ibmcloud cf set-env`.
      SECRET_KEY: change-me-in-production
