<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Credit Card Eligibility Checker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="app-header">
        <a class="brand" href="{{ url_for('home') }}" aria-label="Credit Card Eligibility Checker home">
            <span class="brand-mark">CC</span>
            <span>Credit Card Eligibility Checker</span>
        </a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('predict') }}">Check Eligibility</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Credit Card Eligibility Checker</span>
        <span>Flask Prediction System</span>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
